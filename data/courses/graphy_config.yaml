# Graphy course config — Tarun Gupta Content Machine
# Source of truth for course IDs, pricing, enrolment URLs, student counts.
# Platform: Graphy (Indian, UPI/net-banking/cards, INR native). Backup: Instamojo.
#
# Pricing is launch pricing — raise after 100+ students/reviews per course.
# Early bird: first 50 students per course at launch price, then auto-raise.

platform: graphy
backup_platform: instamojo
currency: INR
payment_methods: [upi, net_banking, debit_card, credit_card]

# All course content is generated with Sonnet 4.6.
content_model: claude-sonnet-4-6

# Distribution channels — split roles, don't conflate (see docs/course-production-guide.md).
# Graphy hosts the one-time paid course; YouTube free is the funnel; YouTube Membership
# is a SEPARATE recurring product, not a course host.
distribution:
  paid_course_host:
    channel: graphy
    model: one_time_inr            # ₹299 etc. — UPI native
    delivers: "10 lessons + worksheets + dirty dataset + certificate + WhatsApp group"
    owns_student_emails: true       # export monthly — own the audience
  funnel:
    channel: youtube_free
    role: "teasers + free Lesson 1 → Graphy course"
    note: "already the primary funnel per outline repurposing layer"
  recurring_side_product:
    channel: youtube_membership
    model: monthly_recurring        # NOT one-time; different product from the course
    perk: "members-only 'Inside the Work' raw sessions + monthly live Q&A"
    youtube_cut_pct: 30
    eligibility: "needs 1k subs + 4k watch-hours; launch Graphy now, add membership when eligible"
    owns_student_emails: false      # YouTube keeps the relationship — why it can't replace Graphy
  youtube_courses_product:
    available: false                # US-first, limited rollout, being wound down — do not rely on for India


courses:
  data_science:
    name: "Data Science from the Inside: A Practitioner's Mindset"
    niche_flag: ds
    audience: "Engineering/CS students + freshers, 18–25"
    modules_planned: 10         # 8–10 original lessons (L10 = AI-as-practitioner capstone)
    lesson_length_min: "10–15"
    format: "video + original code walkthrough + original worksheet"
    # Signature moats (see content/courses/data_science/outline.md):
    differentiators:
      - "Inside the Work raw sessions (unedited real problem-solving) — L2/5/8/10 [TODO: record]"
      - "Real dirty datasets + failure-mode answer key — DONE, 5 built: content/courses/data_science/datasets/{loan_applications,transactions,student_engagement,orders,users}.csv + *_answer_key.md"
      - "Companion code notebooks — DONE: content/courses/data_science/notebooks/{data_audit_starter,notebook_to_module_refactor_kit}.ipynb"
      - "AI-as-practitioner capstone (when to trust vs override AI) — L10"
    certificate: true
    community: "WhatsApp/Telegram group"
    youtube_funnel: "@breathofdatascience"
    price_launch_inr: 299
    price_later_inr: [999, 1499]
    early_bird_seats: 50
    graphy_course_id: ""        # fill after creating shell in Graphy
    enrol_url: ""               # fill after publishing
    students: 0

  life_self_dev:
    name: "Systems for Humans: Build a Life That Doesn't Exhaust You"
    niche_flag: life
    audience: "All students, 16–25"
    modules_planned: 7          # 6–8 original lessons
    lesson_length_min: "8–12"
    format: "talking-head video + journaling prompts + reflection exercises"
    certificate: true
    community: "WhatsApp group with weekly check-in prompts"
    youtube_funnel: "@breathoflife_"
    price_launch_inr: 149
    price_later_inr: [499, 799]
    early_bird_seats: 50
    # Signature moats (see content/courses/life_self_dev/outline.md):
    differentiators:
      - "Real systems-teardown sessions (Tarun's own tracker/check-in/review on screen) — L1/3/5"
      - "Your-life-as-a-dataset tracker kit — L1/2/5/6"
      - "Built for Indian student pressure (academic + family + career, mental-health upkeep) — L3/4"
    graphy_course_id: ""
    enrol_url: ""
    students: 0

  poetry:
    name: "Write Like You Mean It: Poetry for People Who Think They Can't"
    niche_flag: poetry
    audience: "Creative students, 16–25"
    modules_planned: 6          # 5–7 original lessons
    lesson_length_min: "6–10"
    format: "video with Tarun reading + original writing prompts"
    certificate: true
    community: "WhatsApp group for weekly poem sharing"
    youtube_funnel: "@breathofpoetry"
    price_launch_inr: 99
    price_later_inr: [299, 399]
    early_bird_seats: 50
    # Signature moats (see content/courses/poetry/outline.md):
    differentiators:
      - "Write-along sessions (Tarun writing from blank page on camera, crossing out lines) — L3/4/6"
      - "Original prompt deck (starter lines students keep) — all lessons"
      - "Share-without-shame ritual (safe weekly poem share; courage as the product) — L5 + community"
    graphy_course_id: ""
    enrol_url: ""
    students: 0

bundle:
  name: "The Complete Breath Bundle"
  includes: [data_science, life_self_dev, poetry]
  price_launch_inr: 449
  price_later_inr: [1499, 1999]
  graphy_course_id: ""
  enrol_url: ""

refund_policy: "7-day refund if no more than 2 lessons watched"
student_discount: "₹199 student price with .edu email verification (optional)"

# Risk controls (plan: Platform Risk)
backups:
  keep_video_masters: "Google Drive / own storage — never Graphy-only"
  export_student_emails: "monthly from Graphy"
