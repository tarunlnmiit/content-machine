<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; padding: 0; overflow: hidden; width: 1280px; height: 720px; background: #1E1B2E; }

  .thumbnail {
    width: 1280px;
    height: 720px;
    background: #1E1B2E;
    position: relative;
    overflow: hidden;
    display: flex;
  }

  /* ── ACCENT BAR ── */
  .accent-bar {
    position: absolute;
    left: 0; top: 0;
    width: 7px; height: 720px;
    background: linear-gradient(180deg, #8A6E30 0%, #B89850 55%, #D4BC7A 100%);
    z-index: 20;
  }

  /* ── LEFT ZONE ── */
  .left-zone {
    width: 58%;
    height: 100%;
    padding: 64px 36px 56px 64px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #B89850;
    margin-bottom: 22px;
    opacity: 0.85;
  }

  .main-text {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 88px;
    line-height: 0.97;
    text-transform: uppercase;
    color: #EDE8DC;
    letter-spacing: -2px;
    margin-bottom: 30px;
    z-index: 10;
  }

  .main-text .gold {
    color: #D4BC7A;
  }

  .rule {
    width: 72px;
    height: 3px;
    background: linear-gradient(90deg, #B89850 0%, #D4BC7A 100%);
    margin-bottom: 22px;
    border-radius: 2px;
  }

  .sub-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 21px;
    font-weight: 300;
    line-height: 1.55;
    color: #D4BC7A;
    max-width: 440px;
    z-index: 10;
    opacity: 0.92;
  }

  .brand-lockup {
    position: absolute;
    bottom: 44px;
    left: 64px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 15;
  }

  .brand-circle {
    width: 36px; height: 36px;
    background: #B89850;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: #1E1B2E;
    flex-shrink: 0;
  }

  .brand-handle {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: rgba(237, 232, 220, 0.45);
    letter-spacing: 0.5px;
  }

  /* ── RIGHT ZONE ── */
  .right-zone {
    width: 42%;
    height: 100%;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  /* Base atmosphere */
  .rz-atmosphere {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 70% at 65% 35%, rgba(138, 110, 48, 0.18) 0%, transparent 65%),
      radial-gradient(ellipse 55% 65% at 35% 75%, rgba(184, 152, 80, 0.10) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(212, 188, 122, 0.08) 0%, transparent 55%);
    z-index: 1;
  }

  /* Giant open-quote mark — poetry's centrepiece */
  .giant-quote {
    position: absolute;
    top: -40px;
    left: 10px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 480px;
    line-height: 1;
    color: transparent;
    background: linear-gradient(135deg, rgba(184,152,80,0.18) 0%, rgba(212,188,122,0.06) 60%, transparent 100%);
    -webkit-background-clip: text;
    background-clip: text;
    z-index: 2;
    user-select: none;
    pointer-events: none;
  }

  /* Ink-wash blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    z-index: 2;
  }
  .blob-a {
    width: 300px; height: 260px;
    border-radius: 55% 45% 60% 40% / 45% 55% 40% 60%;
    background: radial-gradient(ellipse at 40% 40%, rgba(184,152,80,0.22) 0%, rgba(138,110,48,0.08) 50%, transparent 75%);
    top: 60px; right: -30px;
    transform: rotate(-12deg);
  }
  .blob-b {
    width: 220px; height: 200px;
    border-radius: 40% 60% 50% 55% / 60% 40% 55% 45%;
    background: radial-gradient(ellipse at 55% 55%, rgba(212,188,122,0.18) 0%, rgba(184,152,80,0.06) 55%, transparent 75%);
    bottom: 80px; left: 20px;
    transform: rotate(18deg);
  }
  .blob-c {
    width: 150px; height: 140px;
    border-radius: 60% 40% 45% 55% / 45% 60% 40% 55%;
    background: radial-gradient(ellipse at center, rgba(138,110,48,0.28) 0%, transparent 70%);
    bottom: 30px; right: 50px;
    transform: rotate(-28deg);
  }

  /* Concentric circle outlines */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(184, 152, 80, 0.11);
    top: 50%;
    left: 50%;
    transform: translate(-35%, -50%);
    z-index: 2;
  }
  .ring-lg { width: 460px; height: 460px; margin-left: -230px; margin-top: -230px; border-color: rgba(184,152,80,0.09); }
  .ring-md { width: 310px; height: 310px; margin-left: -155px; margin-top: -155px; border-color: rgba(212,188,122,0.10); }
  .ring-sm { width: 180px; height: 180px; margin-left: -90px; margin-top: -90px; border-color: rgba(184,152,80,0.13); }

  /* Horizontal ink-stroke lines */
  .stroke-lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: repeating-linear-gradient(
      172deg,
      transparent 0px,
      transparent 22px,
      rgba(184, 152, 80, 0.03) 22px,
      rgba(184, 152, 80, 0.03) 24px
    );
    z-index: 2;
  }

  /* Colour spectrum band — vertical prism suggestion */
  .spectrum {
    position: absolute;
    top: 100px;
    right: 28px;
    width: 6px;
    height: 220px;
    border-radius: 3px;
    background: linear-gradient(
      180deg,
      rgba(212,188,122,0.7) 0%,
      rgba(184,152,80,0.8) 25%,
      rgba(138,110,48,0.7) 50%,
      rgba(184,152,80,0.5) 75%,
      rgba(212,188,122,0.4) 100%
    );
    z-index: 3;
  }
  .spectrum-2 {
    position: absolute;
    top: 100px;
    right: 42px;
    width: 3px;
    height: 160px;
    border-radius: 2px;
    background: linear-gradient(
      180deg,
      rgba(212,188,122,0.35) 0%,
      rgba(138,110,48,0.2) 60%,
      transparent 100%
    );
    z-index: 3;
  }

  /* Floating italic word — atmospheric */
  .floater {
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    color: rgba(184,152,80,0.10);
    text-transform: lowercase;
    letter-spacing: 2px;
    z-index: 2;
    user-select: none;
  }
  .fl-1 { font-size: 32px; bottom: 190px; right: 24px; transform: rotate(-8deg); }
  .fl-2 { font-size: 20px; top: 260px; right: 60px; transform: rotate(5deg); opacity: 0.7; }

  /* Palette swatches — bottom right cluster */
  .swatches {
    position: absolute;
    bottom: 44px;
    right: 36px;
    display: flex;
    gap: 7px;
    z-index: 4;
    align-items: flex-end;
  }
  .swatch {
    border-radius: 2px;
    width: 10px;
  }
  .sw-1 { background: #8A6E30; height: 28px; opacity: 0.7; }
  .sw-2 { background: #B89850; height: 38px; opacity: 0.75; }
  .sw-3 { background: #D4BC7A; height: 48px; opacity: 0.7; }
  .sw-4 { background: rgba(237,232,220,0.4); height: 32px; }
  .sw-5 { background: rgba(184,152,80,0.35); height: 22px; }

  /* Left-edge fade from left-zone into right-zone */
  .zone-fade {
    position: absolute;
    top: 0; left: 0;
    width: 120px; height: 100%;
    background: linear-gradient(90deg, #1E1B2E 0%, rgba(30,27,46,0.55) 55%, transparent 100%);
    z-index: 2;
  }

  /* Subtle gold glow center */
  .center-glow {
    position: absolute;
    width: 320px; height: 320px;
    background: radial-gradient(circle at center, rgba(184,152,80,0.12) 0%, transparent 65%);
    top: 50%; left: 45%;
    transform: translate(-50%, -50%);
    z-index: 1;
  }
</style>
</head>
<body>
<div class="thumbnail">

  <div class="accent-bar"></div>

  <!-- LEFT ZONE -->
  <div class="left-zone">
    <div class="eyebrow">Breath of Poetry</div>
    <div class="main-text">
      POETRY<br>
      IN EVERY<br>
      <span class="gold">COLOUR</span>
    </div>
    <div class="rule"></div>
    <div class="sub-text">How the lyric finds you in the code,<br>the grief, and the ordinary Tuesday</div>

    <div class="brand-lockup">
      <div class="brand-circle">B</div>
      <div class="brand-handle">@mistakenlyhuman</div>
    </div>
  </div>

  <!-- RIGHT ZONE -->
  <div class="right-zone">
    <div class="rz-atmosphere"></div>
    <div class="center-glow"></div>
    <div class="giant-quote">"</div>
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
    <div class="ring ring-lg"></div>
    <div class="ring ring-md"></div>
    <div class="ring ring-sm"></div>
    <div class="stroke-lines"></div>
    <div class="spectrum"></div>
    <div class="spectrum-2"></div>
    <div class="floater fl-1">lyric</div>
    <div class="floater fl-2">colour</div>
    <div class="swatches">
      <div class="swatch sw-1"></div>
      <div class="swatch sw-2"></div>
      <div class="swatch sw-3"></div>
      <div class="swatch sw-4"></div>
      <div class="swatch sw-5"></div>
    </div>
    <div class="zone-fade"></div>
  </div>

</div>
</body>
</html>
